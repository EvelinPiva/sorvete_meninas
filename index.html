<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./Mocha.prog.js" defer></script>
    <title>Cálculo de Produção - Pizzaria</title>
</head>

<body>

      <!-- ===== NAV ===== -->
  <header class="nav">
    <nav class="nav-links">
      <a href="./telaInicial.html">HOME</a>
      <a href="">SOBRE NÓS</a>
      <a href="./html/contato.html">CONTATO</a>
    </nav>
    <div class="nav-icon">
        <img src="./img/LOGO_MOCHA.png" alt="">
    </div>
  </header>

    <header class="cabecalho">
        <div class="logo">
            <img src="./img/LOGO_MOCHA.png" alt="logo mocha">
        </div>
        <div class="txt-logo">
            <p>Calculadora Produção por Tonelada</p>
        </div>
    </header>

    <main>
        <section class="ent-dados">
            <div class="btn">
                <button id="btn-limpar">Limpar</button>
                <button id="btn-calcular">Calcular Produção</button>
            </div>

            <div class="div-dados">
                <label for="tamanho">Tamanho Padrão:</label>
                <select id="tamanho">
                    <option value="400">Pequenos (400g)</option>
                    <option value="900" selected>Médios (900g)</option>
                    <option value="">Grandes (1700g)</option>
                </select>
            </div>

           

            <div class="div-dados">
                <label for="espessura">Espessura da Massa (cm):</label>
                <input type="text" id="espessura">
            </div>
        </section>

        <section class="saida-dados">
            <h2>Relatório de Produção</h2>
            <div class="saida-dados" id="resposta">
                <p>Insira os dados da pizza e clique em "Calcular Produção" para ver o rendimento, ingredientes e
                    custos.</p>
            </div>
        </section>
    </main>
</body>

</html>
